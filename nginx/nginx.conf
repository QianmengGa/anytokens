worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # 请求体大小限制
    client_max_body_size 10m;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # 限流（防 DDoS）
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=web:10m rate=60r/s;

    # SSL 配置
    ssl_certificate     /etc/letsencrypt/live/anytokens.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anytokens.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Docker 内置 DNS（运行时解析容器名，避免启动时 DNS 失败）
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ==================== HTTP → HTTPS 跳转 ====================
    server {
        listen 80;
        server_name anytokens.net www.anytokens.net api.anytokens.net;
        return 301 https://$host$request_uri;
    }

    # ==================== anytokens.net → 前端 (HTTPS) ====================
    server {
        listen 443 ssl;
        server_name anytokens.net www.anytokens.net;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            limit_req zone=web burst=30 nodelay;

            set $upstream_frontend http://frontend:3000;
            proxy_pass $upstream_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ==================== api.anytokens.net → 后端 (HTTPS) ====================
    server {
        listen 443 ssl;
        server_name api.anytokens.net;

        # 安全头
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Stripe Webhook
        location /api/v1/payment/webhook {
            client_max_body_size 1m;
            set $upstream_backend http://backend:4000;
            proxy_pass $upstream_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # NOWPayments Webhook
        location /api/v1/crypto-payment/webhook {
            client_max_body_size 1m;
            set $upstream_backend http://backend:4000;
            proxy_pass $upstream_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API 中转（SSE 流式需要关闭缓冲）
        location /api/v1/chat/completions {
            limit_req zone=api burst=10 nodelay;

            set $upstream_backend http://backend:4000;
            proxy_pass $upstream_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE 流式关键配置
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            chunked_transfer_encoding on;
        }

        # 其他 API 路由
        location / {
            limit_req zone=api burst=20 nodelay;

            set $upstream_backend http://backend:4000;
            proxy_pass $upstream_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
