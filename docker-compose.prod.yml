services:
  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    restart: always
    env_file: .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anytokens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-anytokens}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anytokens}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ==================== Backend (Express) ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.production
    environment:
      NODE_ENV: production
      BACKEND_PORT: 4000
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://anytokens.net}
      FRONTEND_URL: ${FRONTEND_URL:-https://anytokens.net}
    networks:
      - internal

  # ==================== Frontend (Next.js) ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.anytokens.net/api/v1}
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://api.anytokens.net}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-https://anytokens.net}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    restart: always
    depends_on:
      - backend
    env_file: .env.production
    networks:
      - internal

  # ==================== Nginx 反向代理 ====================
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - internal

volumes:
  postgres-data:
  redis-data:

networks:
  internal:
    driver: bridge
