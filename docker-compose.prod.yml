services:
  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anytokens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-anytokens}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anytokens}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ==================== Backend (Express) ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BACKEND_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-anytokens}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-anytokens}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://anytokens.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://anytokens.com}
      RESEND_API_KEY: ${RESEND_API_KEY}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY}
      SILICONFLOW_BASE_URL: ${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      NOWPAYMENTS_API_KEY: ${NOWPAYMENTS_API_KEY}
      NOWPAYMENTS_IPN_SECRET: ${NOWPAYMENTS_IPN_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    networks:
      - internal

  # ==================== Frontend (Next.js) ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.anytokens.com/api/v1}
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://api.anytokens.com}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-https://anytokens.com}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    restart: always
    depends_on:
      - backend
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://anytokens.com}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.anytokens.com/api/v1}
    networks:
      - internal

  # ==================== Nginx 反向代理 ====================
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - internal

volumes:
  postgres-data:
  redis-data:

networks:
  internal:
    driver: bridge
